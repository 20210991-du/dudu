<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=1920, initial-scale=1" />
  <title>AI 기반 지능형 통합관제 시스템</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@400;500;600;700&family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    /* ── Tweakable defaults ─────────────────────────────── */
    :root {
      --bg: #f4f6fb;
      --bg-elev: #ffffff;
      --bg-sunk: #f8fafc;
      --bg-code: #f8fafc;
      --line: #e2e8f0;
      --line-soft: #eef1f6;
      --ink: #0f172a;
      --ink-2: #334155;
      --ink-3: #64748b;
      --ink-4: #94a3b8;
      --brand: #4f46e5;
      --brand-2: #3525cd;
      --brand-wash: rgba(79, 70, 229, 0.08);
      --ok: #10b981;
      --warn: #f59e0b;
      --err: #ef4444;
      --accent: #f97316;
      --shadow-card: 0 2px 4px -2px rgba(0,0,0,0.05), 0 4px 6px -1px rgba(0,0,0,0.05);
      --shadow-lg: 0 10px 40px -10px rgba(25,28,29,0.14);
      --shadow-glow: 0 0 0 1px rgba(79,70,229,0.12), 0 20px 60px -20px rgba(79,70,229,0.35);
    }

    html[data-theme="dark"] {
      --bg: #0b1220;
      --bg-elev: #111a2e;
      --bg-sunk: #0d1527;
      --bg-code: #0a1020;
      --line: #1e2a44;
      --line-soft: #162036;
      --ink: #e9eef9;
      --ink-2: #c4cde0;
      --ink-3: #8896b5;
      --ink-4: #55648a;
      --brand: #7c74ff;
      --brand-2: #a79dff;
      --brand-wash: rgba(124, 116, 255, 0.16);
      --ok: #34d399;
      --warn: #fbbf24;
      --err: #f87171;
      --accent: #fb923c;
      --shadow-card: 0 2px 6px -2px rgba(0,0,0,0.5), 0 10px 25px -10px rgba(0,0,0,0.6);
      --shadow-lg: 0 20px 60px -20px rgba(0,0,0,0.8);
      --shadow-glow: 0 0 0 1px rgba(124,116,255,0.25), 0 20px 60px -20px rgba(124,116,255,0.5);
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      font-family: "Noto Sans KR", "Space Grotesk", system-ui, sans-serif;
      color: var(--ink);
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* Fixed 1920 canvas with letterbox scale */
    #stage {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      background: #000;
    }
    #canvas {
      position: relative;
      width: 1920px;
      height: 1080px;
      transform-origin: center center;
      background: var(--bg);
      overflow: hidden;
      transition: background 220ms ease;
    }

    /* Typography defaults */
    .mono { font-family: "JetBrains Mono", "Roboto Mono", ui-monospace, monospace; font-variant-numeric: tabular-nums; }
    .num { font-family: "Space Grotesk", system-ui, sans-serif; font-variant-numeric: tabular-nums; letter-spacing: -0.01em; }

    /* Scrollbar */
    .scroll::-webkit-scrollbar { width: 6px; height: 6px; }
    .scroll::-webkit-scrollbar-thumb { background: var(--ink-4); border-radius: 4px; opacity: .4; }
    .scroll::-webkit-scrollbar-track { background: transparent; }

    /* Live tick pulse used on map markers */
    @keyframes pulse-ring {
      0%   { transform: scale(0.6); opacity: 0.9; }
      100% { transform: scale(2.6); opacity: 0; }
    }
    @keyframes pulse-dot {
      0%, 100% { transform: scale(1); }
      50%      { transform: scale(1.15); }
    }
    @keyframes blink {
      0%, 70% { opacity: 1; }
      71%, 100% { opacity: .25; }
    }
    @keyframes slide-in-up {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes scan-line {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes shimmer {
      0% { background-position: -400px 0; }
      100% { background-position: 400px 0; }
    }

    /* Selection colors */
    ::selection { background: var(--brand-wash); color: var(--ink); }

    /* Buttons reset */
    button { font: inherit; color: inherit; background: none; border: none; cursor: pointer; padding: 0; }
    input { font: inherit; color: inherit; }

    /* No double-render flash while Babel transpiles */
    #root:empty::after {
      content: "";
      position: absolute; inset: 0;
      background: var(--bg);
    }
  </style>

  <script type="application/json" id="tweaks-defaults">/*EDITMODE-BEGIN*/{
    "theme": "light",
    "mapStyle": "light",
    "autoPlay": true
  }/*EDITMODE-END*/</script>
</head>
<body>
  <div id="stage">
    <div id="canvas">
      <div id="root"></div>
    </div>
  </div>

  <!-- React + Babel -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Stage scale script -->
  <script>
    (function(){
      const canvas = document.getElementById('canvas');
      const W = 1920, H = 1080;
      function scale(){
        const iw = window.innerWidth  || document.documentElement.clientWidth  || W;
        const ih = window.innerHeight || document.documentElement.clientHeight || H;
        let s = Math.min(iw / W, ih / H);
        if (!isFinite(s) || s <= 0) s = 1;
        canvas.style.transform = 'scale(' + s + ')';
      }
      scale();
      requestAnimationFrame(scale);
      window.addEventListener('load', scale);
      window.addEventListener('resize', scale);
      if (window.ResizeObserver) {
        new ResizeObserver(scale).observe(document.documentElement);
      }
    })();
  </script>

  <!-- Data + icons + components + app -->
  <script type="text/babel" data-presets="react" src="./data.js"></script>
  <script type="text/babel" data-presets="react" src="./icons.jsx"></script>
  <script type="text/babel" data-presets="react" src="./map.jsx"></script>
  <script type="text/babel" data-presets="react" src="./chrome.jsx"></script>
  <script type="text/babel" data-presets="react" src="./dashboard.jsx"></script>
  <script type="text/babel" data-presets="react" src="./equipment.jsx"></script>
  <script type="text/babel" data-presets="react" src="./login.jsx"></script>
  <script type="text/babel" data-presets="react" src="./tweaks.jsx"></script>
  <script type="text/babel" data-presets="react" src="./app.jsx"></script>
</body>
</html>
